# Render Blueprint - CraKa OSINT Portal (Frontend + API in one service)
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: craka-osint
    runtime: node
    plan: free
    buildCommand: |
      npm install -g pnpm@10.26.1 &&
      pnpm install --no-frozen-lockfile &&
      pnpm --filter @workspace/craka-osint run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: cd artifacts/api-server && pnpm run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: NEON_DATABASE_URL
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: JWT_SECRET
        sync: false
